name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Fetch Flutter packages
        run: flutter pub get
        working-directory: client

      - name: Run analysis
        run: just analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Fetch Flutter packages
        run: flutter pub get
        working-directory: client

      - name: Run tests
        run: just testall

  apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('client/android/**/*.gradle*', 'client/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Fetch Flutter packages
        run: flutter pub get
        working-directory: client

      - name: Build release APK
        run: just apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [apk]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches pubspec version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PUBSPEC_VERSION=$(grep '^version:' client/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "ERROR: tag v${TAG_VERSION} does not match client/pubspec.yaml version ${PUBSPEC_VERSION}"
            echo "Bump client/pubspec.yaml or retag."
            exit 1
          fi
          echo "OK: tag v${TAG_VERSION} matches client/pubspec.yaml version ${PUBSPEC_VERSION}"
          echo "HYACINTH_VERSION=${PUBSPEC_VERSION}" >> "$GITHUB_ENV"

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk
          path: dist/

      - name: Rename APK
        run: mv dist/app-release.apk dist/hyacinth-${{ env.HYACINTH_VERSION }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hyacinth-${{ env.HYACINTH_VERSION }}.apk
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
